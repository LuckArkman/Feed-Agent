version: '3.8'

services:
  backend:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-please-change-this-jwt-secret-key-32-chars}
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-admin123}@postgres:5432/${DB_NAME:-feed_agent}?schema=public
      - MONGODB_URI=mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-root123}@mongodb:27017/${DB_NAME:-feed_agent}?authSource=admin
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - public-network
      - private-network
    volumes:
      - wa_sessions:/app/sessions
      - wa_uploads:/app/uploads
      - app_logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-admin123}
      - POSTGRES_DB=${DB_NAME:-feed_agent}
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - private-network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    image: mongo:6-jammy
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-root123}
      - MONGO_INITDB_DATABASE=${DB_NAME:-feed_agent}
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - private-network
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - private-network
    volumes:
      - redisdata:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  mongodata:
  redisdata:
  wa_sessions:
  wa_uploads:
  app_logs:

networks:
  public-network:
    driver: bridge
  private-network:
    driver: bridge
    internal: true # Isolates this network from external ingress/egress completely
