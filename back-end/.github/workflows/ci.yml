name: Continuous Integration

on:
  push:
    branches: [ main, master, devel, develop ]
  pull_request:
    branches: [ main, master, devel, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Linter (Warnings allowed to pass)
        run: npm run lint || true

      - name: Run Tests
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test_jwt_secret_key_32_characters_long' }}
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/testdb?schema=public"
          MONGODB_URI: "mongodb://localhost:27017/testdb"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
          NODE_ENV: "test"
        run: npm run test
